<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Switchboard Legend — DolzElec</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow Condensed','Barlow',system-ui,sans-serif;background:#e8e8e8;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;background:#f5f5f5;position:relative}
.topbar{background:#0d1b2e;padding:14px 16px 10px;flex-shrink:0}
.topbar-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase}
.topbar-title{font-size:20px;font-weight:700;color:#fff;margin-top:2px}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:#f0a500;background:none;border:none;font-family:inherit;font-weight:600;padding:10px 16px 4px;cursor:pointer}
.nav-tabs{display:flex;border-bottom:0.5px solid rgba(255,255,255,0.15);background:#0d1b2e}
.nav-tab{flex:1;padding:9px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:rgba(255,255,255,0.45);letter-spacing:0.3px;transition:all 0.12s}
.nav-tab.active{color:#f0a500;border-bottom-color:#f0a500}
.scroll{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.section-label{font-size:10px;font-weight:600;color:#999;letter-spacing:0.8px;text-transform:uppercase;margin:10px 0 6px}
.card{background:#fff;border:0.5px solid #e8e8e8;border-radius:10px;padding:10px 12px;margin-bottom:8px}

/* ── Switchboard grid layout ── */
.sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 10px 16px}
.sb-col{display:flex;flex-direction:column;gap:4px}
.sb-col-label{font-size:9px;font-weight:700;color:#999;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:4px 0 2px}
.circuit-card{display:flex;align-items:center;gap:0;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid #e0e0e0;background:#fff;transition:all 0.1s;min-height:46px}
.circuit-card:active{transform:scale(0.98);opacity:0.9}
.phase-tab{width:10px;min-height:46px;flex-shrink:0;align-self:stretch}
.phase-R{background:#c0392b}
.phase-W{background:#bdc3c7}
.phase-B{background:#2980b9}
.phase-SP{background:#7f8c8d}
.circuit-card-inner{flex:1;padding:5px 8px;min-width:0}
.circuit-card-num{font-size:10px;font-weight:700;color:#999;line-height:1}
.circuit-card-label{font-size:12px;font-weight:600;color:#111;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.circuit-card-sub{font-size:10px;color:#aaa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.circuit-card-chip{padding:2px 5px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;margin-right:6px;white-space:nowrap}
.chip-green{background:#EAF3DE;color:#3B6D11}
.chip-amber{background:#FAEEDA;color:#854F0B}
.chip-red{background:#FCEBEB;color:#A32D2D}
.empty-slot{display:flex;align-items:center;border-radius:8px;border:1px dashed #d0d0d0;background:#fafafa;min-height:46px;overflow:hidden;cursor:pointer;opacity:0.75;transition:all 0.1s}
.empty-slot:active{opacity:1;background:#f0f0f0}

/* ── Phase legend ── */
.phase-legend{display:flex;gap:10px;padding:8px 10px;background:#fff;border-radius:8px;margin:0 10px 6px;border:0.5px solid #eee}
.phase-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#666;font-weight:500}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Info rows ── */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid #f0f0f0;gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:#888;flex-shrink:0;padding-top:1px}
.info-val{font-size:12px;font-weight:600;color:#111;text-align:right}

/* ── Buttons ── */
.add-btn{background:#0d1b2e;color:#f0a500;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.add-btn:active{opacity:0.8}
.add-btn:disabled{opacity:0.45;cursor:not-allowed}
.ghost-btn{background:transparent;color:#888;border:0.5px solid #ddd;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.test-row{display:flex;gap:6px;align-items:center;padding:7px 0;border-bottom:0.5px solid #f0f0f0;font-size:11px}
.test-row:last-child{border-bottom:none}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#111}
.field-label{font-size:10px;font-weight:600;color:#888;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:4px;margin-top:2px}
.field-input{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#fff;color:#111;-webkit-appearance:none;appearance:none}
.field-input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
.field-textarea{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;margin-bottom:10px;min-height:72px;resize:vertical;background:#fff;color:#111}
.field-textarea:focus{outline:none;border-color:#378ADD}
.primary-btn{width:100%;background:#0d1b2e;color:#f0a500;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.primary-btn:active{opacity:0.85}
.primary-btn:disabled{opacity:0.45;cursor:not-allowed}
.cancel-btn{width:100%;background:transparent;border:0.5px solid #ddd;border-radius:10px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;color:#555}
.bottombar{background:#0d1b2e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.center-msg{display:flex;align-items:center;justify-content:center;flex:1;padding:60px 20px;text-align:center;color:#aaa;font-size:14px;flex-direction:column;gap:12px}
.info-note{padding:10px 12px;background:#FAEEDA;border-radius:8px;font-size:12px;color:#854F0B;margin-bottom:12px;line-height:1.5}
.cat-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666;display:inline-block;margin:3px}
.cat-chip.sel{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.pri-opt{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666}
.pri-opt.sel{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.supply-opt{flex:1;padding:10px 8px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666}
.supply-opt.sel{background:#0d1b2e;color:#f0a500;border-color:#0d1b2e}
.pin-input{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:10px;font-size:26px;letter-spacing:10px;text-align:center;font-family:monospace;margin-bottom:10px;background:#fff;color:#111}
.pin-input:focus{outline:none;border-color:#378ADD}
.err-msg{font-size:12px;color:#A32D2D;margin-bottom:10px;text-align:center;display:none}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0d1b2e;color:#f0a500;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.qr-box{background:#f5f5f5;border-radius:10px;padding:12px;text-align:center;margin-top:8px;border:0.5px solid #e0e0e0}
.qr-url{font-size:11px;color:#378ADD;word-break:break-all;margin-top:6px;font-family:monospace}
@media(min-width:481px){#app{box-shadow:0 0 40px rgba(0,0,0,0.1)}}
</style>
</head>
<body>
<div id="app"><div class="center-msg"><div style="font-size:40px">⚡</div><div>Connecting…</div></div></div>
<script>
const DB_URL='https://ymbzmszlccgfzdqgxsus.supabase.co';
const DB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltYnptc3psY2NnZnpkcWd4c3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODM1NTgsImV4cCI6MjA5NzE1OTU1OH0.Nnk9WN55DTMfwTt0tVoqJ3Z8wb5dB9aRivz9qKrq4Vk';

const sb=async(path,opts={})=>{
  const isDelete=opts.method==='DELETE';
  const r=await fetch(`${DB_URL}/rest/v1/${path}`,{
    headers:{apikey:DB_KEY,Authorization:`Bearer ${DB_KEY}`,'Content-Type':'application/json',...(isDelete?{}:{Prefer:'return=representation'}),...(opts.headers||{})},
    ...opts
  });
  const t=await r.text();
  if(!r.ok)throw new Error(t);
  return t?JSON.parse(t):null;
};

// ── State ────────────────────────────────────────────────────────────────────
let S={
  sites:[],boards:[],users:[],circuits:[],tests:[],
  currentUser:null,
  view:'loading',
  selectedBoard:null,selectedSite:null,selectedCircuit:null,
  tab:'board',circuitTab:'info',adminTab:'boards',
  modal:null,error:null
};
const set=patch=>{Object.assign(S,patch);draw();};

// ── QR slug routing ───────────────────────────────────────────────────────────
function getSlugFromURL(){
  const p=new URLSearchParams(window.location.search);
  return p.get('board')||null;
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  set({view:'loading'});
  try{
    const[sites,boards,users]=await Promise.all([
      sb('sites?select=*'),
      sb('boards?select=*'),
      sb('users?select=id,name,pin_hash,role,site_id')
    ]);
    S.sites=sites||[];S.boards=boards||[];S.users=users||[];

    // QR code direct routing
    const slug=getSlugFromURL();
    if(slug){
      const board=S.boards.find(b=>b.qr_slug===slug);
      if(board){
        const site=S.sites.find(s=>s.id===board.site_id)||null;
        S.selectedBoard=board;S.selectedSite=site;
        await loadBoard(board,false);
        return;
      }
    }
    set({view:'sites'});
  }catch(e){
    set({view:'error',error:'Could not connect to database.\n\n'+e.message});
  }
}

async function loadBoard(board,updateState=true){
  if(updateState)set({view:'loading'});
  try{
    const[circuits,tests]=await Promise.all([
      sb(`circuits?select=*&board_id=eq.${board.id}&order=number.asc`),
      sb(`rcd_tests?select=*&order=test_date.desc`)
    ]);
    set({circuits:circuits||[],tests:tests||[],view:'board',tab:'board'});
  }catch(e){
    set({view:'error',error:'Failed to load board: '+e.message});
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-AU');}catch(e){return String(d);}}

function phaseFor(slotNum,supplyType){
  if(supplyType==='single_phase')return'SP';
  const p=((slotNum-1)%3);
  return['R','W','B'][p];
}

function phaseColor(ph){
  return{R:'#c0392b',W:'#9E9E9E',B:'#2980b9',SP:'#9E9E9E'}[ph]||'#ccc';
}

function statusColor(c){
  if(!c.has_rcd)return null;
  const last=S.tests.filter(t=>t.circuit_id===c.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date))[0];
  if(!last)return'red';
  const next=new Date(last.test_date);
  next.setMonth(next.getMonth()+(c.test_interval_months||6));
  const diff=(next-new Date())/86400000;
  return diff<0?'red':diff<30?'amber':'green';
}

function chipHtml(status){
  if(!status)return'';
  const m={green:['#EAF3DE','#3B6D11','OK'],amber:['#FAEEDA','#854F0B','Due'],red:['#FCEBEB','#A32D2D','OD']};
  const[bg,c,l]=m[status];
  return`<span class="circuit-card-chip" style="background:${bg};color:${c}">${l}</span>`;
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function boardURL(board){
  const base=window.location.origin+window.location.pathname;
  return`${base}?board=${board.qr_slug||board.id}`;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  const app=document.getElementById('app');if(!app)return;
  switch(S.view){
    case'loading':app.innerHTML=`<div class="center-msg"><div style="font-size:40px">⚡</div><div>Loading…</div></div>`;break;
    case'error':app.innerHTML=`<div class="center-msg"><div style="font-size:36px">⚠️</div><div style="color:#A32D2D;white-space:pre-wrap;font-size:13px">${esc(S.error)}</div><button class="add-btn" style="margin-top:12px" onclick="init()">Retry</button></div>`;break;
    case'sites':drawSites(app);break;
    case'board':drawBoard(app);break;
    case'circuit':drawCircuit(app);break;
    case'admin':drawAdmin(app);break;
  }
  if(S.modal)setTimeout(drawModal,10);
}

// ── Sites ─────────────────────────────────────────────────────────────────────
function drawSites(app){
  let h=`<div class="topbar"><div class="topbar-label">DolzElec</div><div class="topbar-title">Switchboard Legend</div><div class="topbar-sub">Select a switchboard</div></div><div class="scroll">`;
  S.sites.forEach(site=>{
    const siteBoards=S.boards.filter(b=>b.site_id===site.id);
    h+=`<div class="section-label">${esc(site.name)}</div>`;
    if(site.address)h+=`<div style="font-size:11px;color:#aaa;margin-bottom:6px">${esc(site.address)}</div>`;
    if(!siteBoards.length){h+=`<div class="card" style="color:#aaa;font-size:13px;text-align:center;padding:20px">No boards set up yet</div>`;}
    else siteBoards.forEach(b=>{
      h+=`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px" onclick="selBoard('${b.id}','${b.site_id||''}')">
        <div style="width:40px;height:40px;border-radius:8px;background:#0d1b2e;color:#f0a500;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-align:center;line-height:1.2">DB</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(b.name)}</div>
        <div style="font-size:11px;color:#888;margin-top:1px">${esc(b.location||'')} · ${b.ways||24}-way · ${b.supply_type==='single_phase'?'Single phase':'3-phase'}</div></div>
        <span style="font-size:22px;color:#ddd;font-weight:300">›</span></div>`;
    });
  });
  if(!S.sites.length)h+=`<div class="card" style="color:#aaa;font-size:13px;text-align:center;padding:32px">No sites found.<br><span style="font-size:11px">Set up in admin panel.</span></div>`;
  h+=`<button class="ghost-btn" style="width:100%;margin-top:16px" onclick="set({view:'admin',adminTab:'boards'})">⚙ Admin panel</button></div>`;
  app.innerHTML=h;
}

function selBoard(bId,sId){
  S.selectedBoard=S.boards.find(b=>b.id===bId);
  S.selectedSite=S.sites.find(s=>s.id===sId)||null;
  loadBoard(S.selectedBoard);
}

// ── Board view — switchboard grid ─────────────────────────────────────────────
function drawBoard(app){
  const b=S.selectedBoard,site=S.selectedSite;
  const ways=b.ways||24;
  const half=Math.ceil(ways/2);
  const isThreePhase=b.supply_type!=='single_phase';

  // Build circuit lookup by slot number
  const bySlot={};
  S.circuits.forEach(c=>{
    const n=parseInt(c.number);
    if(!isNaN(n))bySlot[n]=c;
  });

  let h=`<div class="topbar">
    <div class="topbar-label">DolzElec — Switchboard</div>
    <div class="topbar-title">${esc(b.name)}</div>
    <div class="topbar-sub">${esc(b.location||'')}${site?' · '+esc(site.name):''} · ${ways}-way · ${isThreePhase?'3-phase':'Single phase'}</div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab ${S.tab==='board'?'active':''}" onclick="set({tab:'board'})">Board</div>
    <div class="nav-tab ${S.tab==='list'?'active':''}" onclick="set({tab:'list'})">List view</div>
    <div class="nav-tab ${S.tab==='plan'?'active':''}" onclick="set({tab:'plan'})">Floor plan</div>
  </div>`;

  if(S.tab==='board'){
    // Phase legend for 3-phase
    if(isThreePhase){
      h+=`<div class="phase-legend">
        <div class="phase-legend-item"><div class="phase-dot" style="background:#c0392b"></div>Red phase</div>
        <div class="phase-legend-item"><div class="phase-dot" style="background:#9E9E9E"></div>White phase</div>
        <div class="phase-legend-item"><div class="phase-dot" style="background:#2980b9"></div>Blue phase</div>
      </div>`;
    }

    h+=`<div class="sb-grid">
      <div class="sb-col">
        <div class="sb-col-label">Circuits 1–${half}</div>`;

    // Left column: 1 to half
    for(let i=1;i<=half;i++){
      const c=bySlot[i];
      const ph=phaseFor(i,b.supply_type);
      const phColor=phaseColor(ph);
      if(c){
        const status=statusColor(c);
        h+=`<div class="circuit-card" onclick="selCircuit('${c.id}')">
          <div class="phase-tab" style="background:${phColor}"></div>
          <div class="circuit-card-inner">
            <div class="circuit-card-num">Circuit ${i}</div>
            <div class="circuit-card-label">${esc(c.label||'Unlabelled')}</div>
            ${c.device_type?`<div class="circuit-card-sub">${esc(c.device_type)}</div>`:''}
          </div>
          ${chipHtml(status)}
        </div>`;
      }else{
        h+=`<div class="empty-slot" onclick="openAddCircuit(${i})">
          <div class="phase-tab" style="background:${phColor};opacity:0.3"></div>
          <div style="padding:5px 8px;flex:1"><div style="font-size:10px;font-weight:700;color:#ccc">Circuit ${i}</div><div style="font-size:11px;color:#bbb;margin-top:1px">Tap to add</div></div>
          <span style="font-size:16px;color:#ccc;padding-right:8px;font-weight:300">+</span>
        </div>`;
      }
    }

    h+=`</div><div class="sb-col"><div class="sb-col-label">Circuits ${half+1}–${ways}</div>`;

    // Right column: half+1 to ways
    for(let i=half+1;i<=ways;i++){
      const c=bySlot[i];
      const ph=phaseFor(i,b.supply_type);
      const phColor=phaseColor(ph);
      if(c){
        const status=statusColor(c);
        h+=`<div class="circuit-card" onclick="selCircuit('${c.id}')">
          <div class="phase-tab" style="background:${phColor}"></div>
          <div class="circuit-card-inner">
            <div class="circuit-card-num">Circuit ${i}</div>
            <div class="circuit-card-label">${esc(c.label||'Unlabelled')}</div>
            ${c.device_type?`<div class="circuit-card-sub">${esc(c.device_type)}</div>`:''}
          </div>
          ${chipHtml(status)}
        </div>`;
      }else{
        h+=`<div class="empty-slot" onclick="openAddCircuit(${i})">
          <div class="phase-tab" style="background:${phColor};opacity:0.3"></div>
          <div style="padding:5px 8px;flex:1"><div style="font-size:10px;font-weight:700;color:#ccc">Circuit ${i}</div><div style="font-size:11px;color:#bbb;margin-top:1px">Tap to add</div></div>
          <span style="font-size:16px;color:#ccc;padding-right:8px;font-weight:300">+</span>
        </div>`;
      }
    }

    h+=`</div></div>`;

  }else if(S.tab==='list'){
    // List view — group by type
    h+=`<div class="scroll">`;
    if(!S.circuits.length){
      h+=`<div class="card" style="text-align:center;padding:40px;color:#aaa">No circuits added yet</div>`;
    }else{
      S.circuits.forEach(c=>{
        const status=statusColor(c);
        const ph=phaseFor(parseInt(c.number)||1,b.supply_type);
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:0.5px solid #e8e8e8;border-radius:10px;margin-bottom:6px;cursor:pointer" onclick="selCircuit('${c.id}')">
          <div style="width:4px;align-self:stretch;border-radius:2px;background:${phaseColor(ph)};flex-shrink:0"></div>
          <div style="width:34px;height:34px;border-radius:7px;background:#0d1b2e;color:#f0a500;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${esc(c.number)}</div>

      });

  }else{

  app.innerHTML=h;
}

function selCircuit(id){

}

// ── Circuit detail ────────────────────────────────────────────────────────────
function drawCircuit(app){
  const c=S.selectedCircuit;if(!c){set({view:'board'});return;}
  const myTests=S.tests.filter(t=>t.circuit_id===c.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date));
  const last=myTests[0];
  let nextDue=null,nextColor='#888';
  if(last&&last.test_date){
    nextDue=new Date(last.test_date);
    nextDue.setMonth(nextDue.getMonth()+(c.test_interval_months||6));
    const diff=(nextDue-new Date())/86400000;
    nextColor=diff<0?'#A32D2D':diff<30?'#854F0B':'#3B6D11';
  }
  const b=S.selectedBoard;
  const ph=phaseFor(parseInt(c.number)||1,b?.supply_type||'three_phase');
  const phColor=phaseColor(ph);
  const phLabel={R:'Red phase',W:'White phase',B:'Blue phase',SP:'Single phase'}[ph]||'—';

  let h=`<div style="background:#0d1b2e;flex-shrink:0">
    <button class="back-btn" onclick="set({view:'board',selectedCircuit:null,modal:null})">← Board</button>
    <div style="padding:2px 16px 10px;display:flex;align-items:flex-start;gap:10px">
      <div style="width:6px;border-radius:3px;background:${phColor};align-self:stretch;flex-shrink:0;margin-top:2px"></div>
      <div><div style="font-size:18px;font-weight:700;color:#fff">Circuit ${esc(c.number)} — ${esc(c.label||'Unlabelled')}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px">${esc(c.device_type||'—')} · ${phLabel}</div></div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab ${S.circuitTab==='info'?'active':''}" onclick="set({circuitTab:'info'})">Info</div>
      <div class="nav-tab ${S.circuitTab==='rcd'?'active':''}" onclick="set({circuitTab:'rcd'})">RCD Tests</div>
    </div>
  </div><div class="scroll">`;

  if(S.circuitTab==='info'){
    const fields=[
      ['Circuit number',esc(c.number||'—')],
      ['Phase',phLabel],
      ['Protection device',esc(c.device_type||'—')],
      ['Cable size',esc(c.cable_size||'—')],
      ['Install date',fmtDate(c.install_date)],
      ['Last edited by',c.last_edited_by?esc(c.last_edited_by)+(c.last_edited_at?' · '+fmtDate(c.last_edited_at):''):'—']
    ];
    h+=`<div class="card">${fields.map(([l,v],i)=>`<div class="info-row"${i===fields.length-1?' style="border-bottom:none"':''}><span class="info-label">${l}</span><span class="info-val">${v}</span></div>`).join('')}</div>`;
    if(c.notes)h+=`<div class="card"><div class="section-label" style="margin-top:0">Notes</div><p style="font-size:13px;color:#333;line-height:1.6;margin-top:5px">${esc(c.notes)}</p></div>`;
    h+=`<div style="display:flex;gap:8px;margin-top:4px">
      <button class="add-btn" style="flex:1;justify-content:center" onclick="openModal('edit')">✏ Edit circuit</button>
      <button class="ghost-btn" onclick="openModal('request')">+ Request icon</button>
    </div>`;
  }else{
    if(!c.has_rcd){
      h+=`<div class="card" style="text-align:center;padding:28px"><p style="font-size:13px;color:#888;margin-bottom:14px">No RCD protection on this circuit</p><button class="add-btn" style="margin:0 auto;justify-content:center" onclick="openModal('edit')">Enable RCD tracking</button></div>`;
    }else{
      const tf=[
        ['Test interval',(c.test_interval_months||6)+' months',''],
        ['Last test',last?fmtDate(last.test_date):'Never tested',''],
        ['Last result',last?(last.result||'').toUpperCase():'—',last?'color:'+(last.result==='pass'?'#3B6D11':'#A32D2D'):''],
        ['Next due',nextDue?fmtDate(nextDue):'—','color:'+nextColor]
      ];
      h+=`<div class="card">${tf.map(([l,v,st],i)=>`<div class="info-row"${i===3?' style="border-bottom:none"':''}><span class="info-label">${l}</span><span class="info-val"${st?' style="'+st+'"':''}>${v}</span></div>`).join('')}</div>`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="section-label" style="margin:0">Test history</div><button class="add-btn" onclick="openModal('rcd')">+ Log test</button></div>`;
      if(!myTests.length){h+=`<div class="card" style="text-align:center;color:#aaa;font-size:13px;padding:24px">No tests logged yet</div>`;}
      else h+=`<div class="card">${myTests.map((t,i)=>`<div class="test-row"${i===myTests.length-1?' style="border-bottom:none"':''}><span style="color:#888;width:80px;flex-shrink:0">${fmtDate(t.test_date)}</span><span style="font-weight:600;width:50px;flex-shrink:0">${t.trip_time_ms!=null?t.trip_time_ms+'ms':'—'}</span><span style="flex:1;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.tested_by||'—')}</span><span style="font-weight:700;font-size:10px;color:${t.result==='pass'?'#3B6D11':'#A32D2D'};flex-shrink:0">${(t.result||'').toUpperCase()}</span></div>`).join('')}</div>`;
    }
  }
  h+=`</div>`;
  app.innerHTML=h;
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openAddCircuit(slotNum){

}

function openModal(type){S.modal=type;drawModal();}
function closeModal(){S.modal=null;document.querySelector('.modal-overlay')?.remove();}

function drawModal(){
  document.querySelector('.modal-overlay')?.remove();
  if(!S.modal)return;
  const c=S.selectedCircuit;
  const loggedIn=!!S.currentUser;
  const pinField=`<label class="field-label">Your PIN</label><input class="pin-input" id="m-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"><div class="err-msg" id="m-err"></div>`;
  const whoLine=loggedIn?`<div style="font-size:12px;color:#555;margin-bottom:14px">As: <strong>${esc(S.currentUser.name)}</strong></div>`:`<div class="info-note">Enter your PIN — edits are stamped with your name</div>`;
  let body='';

  if(S.modal==='add-circuit'){
    const slot=S._addSlot||1;
    const b=S.selectedBoard;
    const ph=phaseFor(slot,b?.supply_type||'three_phase');
    const phLabel={R:'Red phase',W:'White phase',B:'Blue phase',SP:'Single phase'}[ph]||'—';
    const phColor=phaseColor(ph);
    body=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:6px;height:40px;border-radius:3px;background:${phColor};flex-shrink:0"></div>
      <div><div class="modal-title" style="margin-bottom:2px">Add circuit ${slot}</div>
      <div style="font-size:12px;color:#888">${phLabel} · ${esc(b?.name||'')}</div></div>
    </div>
    ${whoLine}
    <label class="field-label">Label *</label><input class="field-input" id="ac-label" placeholder="e.g. Kitchen Appliances">
    <label class="field-label">Protection device</label><input class="field-input" id="ac-device" placeholder="e.g. 20A MCB + RCD">
    <label class="field-label">Cable size</label><input class="field-input" id="ac-cable" placeholder="e.g. 2.5mm² TPS">
    <label class="field-label">Install date</label><input class="field-input" id="ac-date" type="date">
    <label class="field-label">Notes</label><textarea class="field-textarea" id="ac-notes" placeholder="Any notes about this circuit…"></textarea>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><input type="checkbox" id="ac-rcd"><label for="ac-rcd" style="font-size:13px">Has RCD protection</label></div>
    <div id="ac-interval-wrap" style="display:none">
      <label class="field-label">Test interval</label>
      <select class="field-input" id="ac-interval">${[3,6,12,24].map(m=>`<option value="${m}"${m===6?' selected':''}>${m} months</option>`).join('')}</select>

    <button class="primary-btn" id="m-save" onclick="saveAddCircuit()">Add circuit</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }
  else if(S.modal==='edit'&&c){
    body=`<div class="modal-title">Edit — Circuit ${esc(c.number)}</div>${whoLine}
      <label class="field-label">Label</label><input class="field-input" id="e-label" value="${esc(c.label||'')}" placeholder="e.g. Kitchen Appliances">
      <label class="field-label">Protection device</label><input class="field-input" id="e-device" value="${esc(c.device_type||'')}" placeholder="e.g. 20A MCB + RCD">
      <label class="field-label">Cable size</label><input class="field-input" id="e-cable" value="${esc(c.cable_size||'')}" placeholder="e.g. 2.5mm² TPS">
      <label class="field-label">Notes</label><textarea class="field-textarea" id="e-notes" placeholder="Any notes…">${esc(c.notes||'')}</textarea>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><input type="checkbox" id="e-rcd" ${c.has_rcd?'checked':''}><label for="e-rcd" style="font-size:13px">Has RCD protection</label></div>
      <div id="e-interval-wrap" style="${c.has_rcd?'':'display:none'}">
        <label class="field-label">Test interval</label>
        <select class="field-input" id="e-interval">${[3,6,12,24].map(m=>`<option value="${m}"${(c.test_interval_months||6)===m?' selected':''}>${m} months</option>`).join('')}</select>
      </div>
      ${!loggedIn?pinField:''}
      <button class="primary-btn" id="m-save" onclick="saveEdit()">Save changes</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }else if(S.modal==='rcd'&&c){
    const today=new Date().toISOString().split('T')[0];
    body=`<div class="modal-title">Log RCD test</div><p style="font-size:12px;color:#888;margin-bottom:14px">${esc(c.label||'Circuit '+c.number)}</p>${whoLine}
      <label class="field-label">Date</label><input class="field-input" id="r-date" type="date" value="${today}">
      <label class="field-label">Trip time (ms)</label><input class="field-input" id="r-ms" type="number" inputmode="decimal" placeholder="e.g. 18">
      <label class="field-label">Result</label><select class="field-input" id="r-result"><option value="pass">Pass (&lt;300ms)</option><option value="fail">Fail</option></select>
      <label class="field-label">Notes (optional)</label><textarea class="field-textarea" id="r-notes" placeholder="Any observations…"></textarea>
      ${!loggedIn?pinField:''}
      <button class="primary-btn" id="m-save" onclick="saveRCD()">Save test</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }else if(S.modal==='request'){
    body=`<div class="modal-title">Request a new icon</div><p style="font-size:12px;color:#888;margin-bottom:14px;line-height:1.5">Come across a fitting not in the library? Declan will add it.</p>${whoLine}
      <label class="field-label">Fitting / device name *</label><input class="field-input" id="q-name" placeholder="e.g. High bay fitting…">
      <label class="field-label">Category</label>
      <div style="margin-bottom:12px">${['Lighting','Emergency lighting','Power / GPO','Switching & control','HVAC','Other'].map(cat=>`<span class="cat-chip" data-cat="${cat}" onclick="toggleCat(this)">${cat}</span>`).join('')}</div>
      <label class="field-label">Description</label><textarea class="field-textarea" id="q-desc" placeholder="Mounting type, size, brand…"></textarea>
      <label class="field-label">Where on this job</label><input class="field-input" id="q-loc" placeholder="e.g. DB1 — Circuit 3, north wall">
      <label class="field-label" style="margin-bottom:6px">Priority</label>
      <div style="display:flex;gap:8px;margin-bottom:14px"><div class="pri-opt sel" id="pri-normal" onclick="selPri('normal')">Normal</div><div class="pri-opt" id="pri-urgent" onclick="selPri('urgent')">Urgent</div></div>
      ${!loggedIn?pinField:''}
      <button class="primary-btn" onclick="saveRequest()">Submit request</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }

  if(!body)return;
  const o=document.createElement('div');o.className='modal-overlay';
  o.onclick=e=>{if(e.target===o)closeModal();};
  o.innerHTML=`<div class="modal-box">${body}</div>`;
  document.getElementById('app').appendChild(o);

  const rcdCb=document.getElementById('e-rcd');
  if(rcdCb)rcdCb.addEventListener('change',()=>{
    const w=document.getElementById('e-interval-wrap');if(w)w.style.display=rcdCb.checked?'':'none';
  });
  const acRcdCb=document.getElementById('ac-rcd');
  if(acRcdCb)acRcdCb.addEventListener('change',()=>{
    const w=document.getElementById('ac-interval-wrap');if(w)w.style.display=acRcdCb.checked?'':'none';
  });
}

window._cat='';window._pri='normal';
function toggleCat(el){document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');window._cat=el.dataset.cat||'';}
function selPri(p){window._pri=p;['normal','urgent'].forEach(id=>{const el=document.getElementById('pri-'+id);if(el)el.classList.toggle('sel',id===p);});}

function getPin(){
  if(S.currentUser)return S.currentUser;
  const val=(document.getElementById('m-pin')?.value||'').trim();
  const user=S.users.find(u=>u.pin_hash===val);
  if(!user){const err=document.getElementById('m-err');if(err){err.style.display='block';err.textContent='Incorrect PIN — try again';}}
  return user||null;
}

async function saveAddCircuit(){
  const user=getPin();if(!user)return;
  const label=(document.getElementById('ac-label')?.value||'').trim();
  if(!label){
    const err=document.getElementById('m-err');
    if(err){err.style.display='block';err.textContent='Please enter a label for this circuit.';}
    return;
  }
  const btn=document.getElementById('m-save');if(btn)btn.disabled=true;
  const hasRcd=document.getElementById('ac-rcd')?.checked||false;
  const data={
    board_id:S.selectedBoard.id,
    number:String(S._addSlot),
    label,
    device_type:document.getElementById('ac-device')?.value||null,
    cable_size:document.getElementById('ac-cable')?.value||null,
    install_date:document.getElementById('ac-date')?.value||null,
    notes:document.getElementById('ac-notes')?.value||null,
    has_rcd:hasRcd,
    test_interval_months:hasRcd?parseInt(document.getElementById('ac-interval')?.value)||6:6,
    last_edited_by:user.name,
    last_edited_at:new Date().toISOString()
  };
  try{
    const res=await sb('circuits',{method:'POST',body:JSON.stringify(data)});
    const nc=Array.isArray(res)?res[0]:res;
    S.circuits=[...S.circuits,nc];
    S.currentUser=user;S.modal=null;
    draw();showToast('✓ Circuit '+S._addSlot+' added');
  }catch(e){
    if(btn)btn.disabled=false;
    const err=document.getElementById('m-err');
    if(err){err.style.display='block';err.textContent='Failed: '+e.message;}
  }
}

async function saveEdit(){
  const user=getPin();if(!user)return;
  const btn=document.getElementById('m-save');if(btn)btn.disabled=true;
  const data={label:document.getElementById('e-label')?.value||null,device_type:document.getElementById('e-device')?.value||null,cable_size:document.getElementById('e-cable')?.value||null,notes:document.getElementById('e-notes')?.value||null,has_rcd:document.getElementById('e-rcd')?.checked||false,test_interval_months:parseInt(document.getElementById('e-interval')?.value)||6,last_edited_by:user.name,last_edited_at:new Date().toISOString()};
  try{
    const res=await sb(`circuits?id=eq.${S.selectedCircuit.id}`,{method:'PATCH',body:JSON.stringify(data)});
    const updated=Array.isArray(res)?res[0]:res;
    S.circuits=S.circuits.map(c=>c.id===updated.id?updated:c);S.selectedCircuit=updated;S.currentUser=user;S.modal=null;
    draw();showToast('✓ Circuit saved');
  }catch(e){if(btn)btn.disabled=false;const err=document.getElementById('m-err');if(err){err.style.display='block';err.textContent='Save failed: '+e.message;}}
}

async function saveRCD(){
  const user=getPin();if(!user)return;
  const btn=document.getElementById('m-save');if(btn)btn.disabled=true;
  const msVal=document.getElementById('r-ms')?.value;
  const data={circuit_id:S.selectedCircuit.id,test_date:document.getElementById('r-date')?.value,trip_time_ms:msVal?parseFloat(msVal):null,result:document.getElementById('r-result')?.value||'pass',tested_by:user.name,notes:document.getElementById('r-notes')?.value||null};
  try{
    const res=await sb('rcd_tests',{method:'POST',body:JSON.stringify(data)});
    const nt=Array.isArray(res)?res[0]:res;
    S.tests=[nt,...S.tests];S.currentUser=user;S.modal=null;
    draw();showToast('✓ Test logged');
  }catch(e){if(btn)btn.disabled=false;const err=document.getElementById('m-err');if(err){err.style.display='block';err.textContent='Save failed: '+e.message;}}
}

async function saveRequest(){
  const user=getPin();if(!user)return;
  const name=(document.getElementById('q-name')?.value||'').trim();
  if(!name){const err=document.getElementById('m-err');if(err){err.style.display='block';err.textContent='Please enter the fitting name.';}return;}
  const data={fitting_name:name,category:window._cat||null,description:document.getElementById('q-desc')?.value||null,location_on_job:document.getElementById('q-loc')?.value||null,priority:window._pri||'normal',requested_by:user.name,site_id:S.selectedSite?.id||S.sites[0]?.id||null};
  try{
    await sb('icon_requests',{method:'POST',body:JSON.stringify(data)});
    S.currentUser=user;S.modal=null;draw();showToast('✓ Request sent — Declan notified');
  }catch(e){const err=document.getElementById('m-err');if(err){err.style.display='block';err.textContent='Failed: '+e.message;}}
}

    <div class="nav-tabs">

        <div class="qr-box">
          <div style="font-size:10px;font-weight:600;color:#999;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px">QR code URL</div>

          <button onclick="copyURL('${esc(url)}')" style="margin-top:8px;background:#0d1b2e;color:#f0a500;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Copy URL</button>
        </div>
      </div>`;

    h+=`<button class="add-btn" style="width:100%;justify-content:center;margin-top:4px" onclick="openAddUser()">+ Add user</button>`;

function copyURL(url){
  navigator.clipboard?.writeText(url).then(()=>showToast('✓ URL copied')).catch(()=>{
    const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast('✓ URL copied');
  });
}

function openAddBoard(){
  const o=document.createElement('div');o.className='modal-overlay';
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div class="modal-box">
    <div class="modal-title">Add switchboard</div>
    <label class="field-label">Board name</label><input class="field-input" id="nb-name" placeholder="e.g. Distribution Board 2">
    <label class="field-label">Location</label><input class="field-input" id="nb-loc" placeholder="e.g. Level 1, Workshop">
    <label class="field-label">Number of poles</label>
    <select class="field-input" id="nb-ways">${[12,16,18,20,24,32,36,40,48,64].map(n=>`<option value="${n}"${n===24?' selected':''}>${n}-pole</option>`).join('')}</select>
    <label class="field-label" style="margin-bottom:6px">Supply type</label>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div class="supply-opt sel" id="sup-three" onclick="selSupply('three_phase')">Three phase</div>
      <div class="supply-opt" id="sup-single" onclick="selSupply('single_phase')">Single phase</div>
    </div>
    <div class="err-msg" id="nb-err"></div>
    <button class="primary-btn" id="nb-save" onclick="doAddBoard()">Add board</button>
    <button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
  </div>`;
  document.getElementById('app').appendChild(o);
}

window._supply='three_phase';
function selSupply(v){
  window._supply=v;
  ['three','single'].forEach(id=>{
    const el=document.getElementById('sup-'+id);
    if(el)el.classList.toggle('sel',(id==='three'&&v==='three_phase')||(id==='single'&&v==='single_phase'));
  });
}

async function doAddBoard(){
  const name=(document.getElementById('nb-name')?.value||'').trim();
  if(!name){const err=document.getElementById('nb-err');if(err){err.style.display='block';err.textContent='Please enter a board name.';}return;}
  const btn=document.getElementById('nb-save');if(btn)btn.disabled=true;
  try{
    const res=await sb('boards',{method:'POST',body:JSON.stringify({
      name,
      location:document.getElementById('nb-loc')?.value||null,
      ways:parseInt(document.getElementById('nb-ways')?.value)||24,
      supply_type:window._supply||'three_phase',
      site_id:S.sites[0]?.id
    })});
    const nb=Array.isArray(res)?res[0]:res;
    S.boards=[...S.boards,nb];
    document.querySelector('.modal-overlay')?.remove();
    draw();showToast('✓ Board added');
  }catch(e){if(btn)btn.disabled=false;alert('Failed: '+e.message);}
}

function openAddUser(){
  const o=document.createElement('div');o.className='modal-overlay';
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div class="modal-box">
    <div class="modal-title">Add user</div>
    <label class="field-label">Name</label><input class="field-input" id="nu-name" placeholder="e.g. Declan D">
    <label class="field-label">4-digit PIN</label><input class="pin-input" id="nu-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <div class="err-msg" id="nu-err"></div>
    <button class="primary-btn" id="nu-save" onclick="doAddUser()">Add user</button>
    <button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
  </div>`;
  document.getElementById('app').appendChild(o);
}

function openEditUser(id){
  const u=S.users.find(x=>x.id===id);if(!u)return;
  const o=document.createElement('div');o.className='modal-overlay';
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div class="modal-box">
    <div class="modal-title">Edit user — ${esc(u.name)}</div>
    <label class="field-label">Name</label>
    <input class="field-input" id="eu-name" value="${esc(u.name)}" placeholder="e.g. Declan D">
    <label class="field-label">New PIN (leave blank to keep current)</label>
    <input class="pin-input" id="eu-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    <label class="field-label" style="margin-bottom:6px">Role</label>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div class="supply-opt ${u.role==='admin'?'sel':''}" id="eu-role-admin" onclick="selRole('admin')">Admin</div>
      <div class="supply-opt ${u.role!=='admin'?'sel':''}" id="eu-role-editor" onclick="selRole('editor')">Editor</div>
    </div>
    <div class="err-msg" id="eu-err"></div>
    <button class="primary-btn" id="eu-save" onclick="doEditUser('${u.id}')">Save changes</button>
    <button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
  </div>`;
  document.getElementById('app').appendChild(o);
  window._euRole=u.role||'editor';
}

function selRole(r){
  window._euRole=r;
  ['admin','editor'].forEach(id=>{
    const el=document.getElementById('eu-role-'+id);
    if(el)el.classList.toggle('sel',id===r);
  });
}

async function doEditUser(id){
  const name=(document.getElementById('eu-name')?.value||'').trim();
  if(!name){const err=document.getElementById('eu-err');if(err){err.style.display='block';err.textContent='Name cannot be empty.';}return;}
  const pin=(document.getElementById('eu-pin')?.value||'').trim();
  if(pin&&pin.length!==4){const err=document.getElementById('eu-err');if(err){err.style.display='block';err.textContent='PIN must be exactly 4 digits.';}return;}
  const btn=document.getElementById('eu-save');if(btn)btn.disabled=true;
  const data={name,role:window._euRole||'editor'};
  if(pin)data.pin_hash=pin;
  try{
    const res=await sb(`users?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(data)});
    const updated=Array.isArray(res)?res[0]:res;
    S.users=S.users.map(u=>u.id===updated.id?updated:u);
    document.querySelector('.modal-overlay')?.remove();
    draw();showToast('✓ User updated');
  }catch(e){
    if(btn)btn.disabled=false;
    const err=document.getElementById('eu-err');
    if(err){err.style.display='block';err.textContent='Failed: '+e.message;}
  }
}

function openDeleteUser(id,name){
  const o=document.createElement('div');o.className='modal-overlay';
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div class="modal-box">
    <div class="modal-title">Remove user</div>
    <p style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.6">Are you sure you want to remove <strong>${esc(name)}</strong>? This cannot be undone.</p>
    <div class="err-msg" id="du-err"></div>
    <button class="primary-btn" id="du-save" style="background:#A32D2D;color:#fff" onclick="doDeleteUser('${id}')">Yes, remove user</button>
    <button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
  </div>`;
  document.getElementById('app').appendChild(o);
}

async function doDeleteUser(id){
  const btn=document.getElementById('du-save');if(btn)btn.disabled=true;
  try{
    await sb(`users?id=eq.${id}`,{method:'DELETE'});
    S.users=S.users.filter(u=>u.id!==id);
    document.querySelector('.modal-overlay')?.remove();
    draw();showToast('✓ User removed');
  }catch(e){
    if(btn)btn.disabled=false;
    const err=document.getElementById('du-err');
    if(err){err.style.display='block';err.textContent='Failed: '+e.message;}
  }
}

async function doAddUser(){
  const name=(document.getElementById('nu-name')?.value||'').trim();
  const pin=(document.getElementById('nu-pin')?.value||'').trim();
  if(!name||pin.length!==4){const err=document.getElementById('nu-err');if(err){err.style.display='block';err.textContent='Enter a name and exactly 4 digits.';}return;}
  const btn=document.getElementById('nu-save');if(btn)btn.disabled=true;
  try{
    const res=await sb('users',{method:'POST',body:JSON.stringify({name,pin_hash:pin,role:'editor',site_id:S.sites[0]?.id})});
    const nu=Array.isArray(res)?res[0]:res;
    S.users=[...S.users,nu];document.querySelector('.modal-overlay')?.remove();draw();showToast('✓ User added');
  }catch(e){if(btn)btn.disabled=false;alert('Failed: '+e.message);}
}

init();
</script>
</body>
</html>
